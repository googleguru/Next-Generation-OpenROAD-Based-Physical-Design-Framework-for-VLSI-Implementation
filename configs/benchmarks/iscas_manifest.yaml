# ISCAS benchmark manifest
# Sequential circuits (s-series) are synthesized via Yosys to a target library.
# Combinational circuits (c-series) are skipped — no clock domain.

base_dir: "benchmarks/iscas"

# Shared PDK collateral for all ISCAS circuits
lib_file: "../../pdks/nangate45/CCS/NangateOpenCellLibrary_typical.lib"
pdk_lef: "../../pdks/nangate45/FreePDK45/Cells.lef"

circuits:
  # --- Combinational (will be auto-skipped) ---
  - name: "c17"
    bench_file: "combinational/c17.bench"
    clock_period_ns: 5.0
    die_area: [0, 0, 50, 50]

  - name: "c432"
    bench_file: "combinational/c432.bench"
    clock_period_ns: 5.0
    die_area: [0, 0, 100, 100]

  - name: "c880"
    bench_file: "combinational/c880.bench"
    clock_period_ns: 5.0
    die_area: [0, 0, 200, 200]

  - name: "c7552"
    bench_file: "combinational/c7552.bench"
    clock_period_ns: 5.0
    die_area: [0, 0, 500, 500]

  # --- Sequential (will be synthesized and implemented) ---
